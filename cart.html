<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopLite - Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex flex-col min-h-screen font-sans">
<nav class="bg-gray-900 text-white sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4">
        <div class="flex justify-between h-16 items-center">
            <a href="index.html" class="font-bold text-xl">ShopLite</a>
        </div>
    </div>
</nav>

<main class="max-w-6xl mx-auto px-4 flex-grow my-12 w-full">
    <h1 class="text-3xl font-bold text-gray-800 mb-6"><i class="fas fa-shopping-bag mr-2"></i>Your Shopping Cart</h1>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2">
            <div id="empty-cart-msg" class="hidden bg-white border border-gray-200 text-center py-12 px-4 rounded-xl shadow-sm">
                <i class="fas fa-shopping-cart text-gray-300 text-5xl mb-4"></i>
                <p class="text-xl text-gray-500 mb-4">Your cart is empty!</p>
                <a href="index.html" class="inline-block bg-blue-600 text-white font-semibold px-6 py-2.5 rounded-lg hover:bg-blue-700 transition">Go Shopping Now</a>
            </div>
            <div id="cart-items-container" class="space-y-4"></div>
        </div>

        <div class="lg:col-span-1">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h3 class="text-lg font-bold border-b border-gray-200 pb-3 text-gray-800">Order Summary</h3>
                <div class="flex justify-between my-4 text-lg">
                    <span class="text-gray-600">Total Price:</span>
                    <strong id="cart-total" class="text-red-600 text-xl font-bold">$0.00</strong>
                </div>
                <button class="w-full bg-green-600 text-white font-bold py-3 rounded-xl hover:bg-green-700 transition duration-200 shadow">Proceed to Checkout</button>
            </div>
        </div>
    </div>
</main>

<footer class="bg-gray-900 text-gray-300 text-center py-6 mt-auto">
    <p>&copy; 2026 ShopLite. All rights reserved.</p>
</footer>

<script src="js/cart.js"></script>
</body>
</html>
