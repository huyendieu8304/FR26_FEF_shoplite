<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopLite - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen font-sans">
<nav class="bg-gray-900 text-white sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4">
        <div class="flex justify-between h-16 items-center">
            <a href="index.html" class="font-bold text-xl">ShopLite</a>
            <div class="flex space-x-4">
                <a href="index.html" class="text-gray-300 hover:text-white">Home</a>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-md mx-auto px-4 flex-grow my-12 w-full">
    <div class="bg-white p-8 rounded-xl shadow-md border border-gray-100">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Create Account</h2>

        <div id="success-alert" class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4 text-center" role="alert">
            Registration successful! Welcome to ShopLite.
        </div>

        <form id="register-form" novalidate class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Full Name</label>
                <input type="text" id="fullname" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none">
                <div class="error-text text-red-500 text-xs mt-1" id="err-fullname"></div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
                <input type="email" id="email" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none">
                <div class="error-text text-red-500 text-xs mt-1" id="err-email"></div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <input type="password" id="password" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none">
                <div class="error-text text-red-500 text-xs mt-1" id="err-password"></div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Phone Number</label>
                <input type="text" id="phone" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none">
                <div class="error-text text-red-500 text-xs mt-1" id="err-phone"></div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Gender</label>
                <select id="gender" class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-blue-400 focus:outline-none">
                    <option value="">Choose gender...</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
                <div class="error-text text-red-500 text-xs mt-1" id="err-gender"></div>
            </div>

            <div class="flex flex-col">
                <div class="flex items-center">
                    <input type="checkbox" id="terms" class="h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                    <label for="terms" class="ml-2 text-sm text-gray-500">I agree to the terms and conditions</label>
                </div>
                <div class="error-text text-red-500 text-xs mt-1" id="err-terms"></div>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2.5 rounded-lg hover:bg-blue-700 transition duration-200">Register</button>
        </form>
    </div>
</main>

<footer class="bg-gray-900 text-gray-300 text-center py-6 mt-auto">
    <p>&copy; 2026 ShopLite. All rights reserved.</p>
</footer>

<script src="js/register.js"></script>
</body>
</html>
